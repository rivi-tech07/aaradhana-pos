<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Aaradhna Menu Edit</title>
    <link rel="stylesheet" href="owner.css" />
  </head>
  <body>
    <main class="owner">
      <header class="owner-header">
        <div class="brand">
          <img
            src="assets/aaradhna-logo.png"
            alt="Aaradhna Ice Dish & Gola logo"
          />
          <div>
            <p>Aaradhna Ice Dish & Gola</p>
            <h1>Menu & Price Edit</h1>
          </div>
        </div>
        <nav>
          <a href="/">Billing</a>
          <a href="owner.html">Owner Report</a>
        </nav>
      </header>

      <section class="editor-actions">
        <button id="addItemBtn" type="button">Add Item</button>
        <button id="saveMenuBtn" type="button">Save Menu</button>
        <span id="saveStatus"></span>
      </section>

      <section class="menu-editor" id="menuEditor"></section>

      <section class="flavour-editor">
        <div class="flavour-editor-header">
          <div>
            <p>Aaradhna flavour list</p>
            <h2>Flavour Edit</h2>
          </div>
          <button id="saveFlavoursBtn" type="button">Save Flavours</button>
          <span id="flavourSaveStatus"></span>
        </div>
        <div class="flavour-columns">
          <article>
            <h3>Sweet Flavor</h3>
            <div class="add-flavour-row">
              <input
                id="sweetInput"
                type="text"
                placeholder="New sweet flavour"
              />
              <button id="addSweetBtn" type="button">Add</button>
            </div>
            <div id="sweetList" class="flavour-list"></div>
          </article>
          <article>
            <h3>Khata Mitha</h3>
            <div class="add-flavour-row">
              <input
                id="khataMithaInput"
                type="text"
                placeholder="New khata mitha flavour"
              />
              <button id="addKhataMithaBtn" type="button">Add</button>
            </div>
            <div id="khataMithaList" class="flavour-list"></div>
          </article>
        </div>
      </section>
    </main>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
    <script src="firebase-config.js"></script>
    <script src="menu.js"></script>
  </body>
</html>
